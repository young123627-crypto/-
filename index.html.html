<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>전개도 → 입체도형</title>
<style>
  :root{--blue:#2563eb;--line:#dbeafe;--grid:#e8f1ff;--ink:#0f172a}
  *{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;color:var(--ink);overflow:hidden;background:#f8fbff}
  header{height:52px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid #d7e5f7;background:white;font-weight:900;font-size:28px}
  header b{color:#1d4ed8;margin-right:8px}.app{height:calc(100vh - 52px);display:flex}
  aside{width:240px;background:#fff;border-right:1px solid #d7e5f7;padding:24px 14px;overflow:auto}
  h3{font-size:15px;margin:14px 0 10px}.btn{width:100%;height:52px;border:1.5px solid #bcd3f3;background:#fff;border-radius:12px;margin:8px 0;font-size:16px;font-weight:900;cursor:pointer}
  .btn.active,.primary{background:var(--blue);color:white;border-color:var(--blue)}.primary{margin-top:14px}.smallbox{background:#eef6ff;border-radius:12px;margin-top:18px;padding:14px;font-size:13px;line-height:1.7;font-weight:700}
  main{flex:1;position:relative;background-color:#f8fbff;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:32px 32px}
  #stage{width:100%;height:100%;display:block;cursor:grab} #stage:active{cursor:grabbing}
  .label{position:absolute;top:20px;left:32px;background:#2563eb;color:white;padding:14px 22px;border-radius:10px;font-weight:900;font-size:18px;box-shadow:0 8px 18px rgba(37,99,235,.18)}
  .hint{position:absolute;right:24px;top:24px;background:white;border:1px solid #cfe0f5;border-radius:999px;padding:11px 18px;font-weight:900;font-size:15px}
  .toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);background:white;border:1px solid #cfe0f5;border-radius:12px;padding:13px 24px;font-weight:900;color:#1d4ed8;box-shadow:0 6px 20px rgba(15,23,42,.08)}
</style>
</head>
<body>
<header><b>전개도</b> → 입체도형</header>
<div class="app">
  <aside>
    <h3>도형 선택</h3>
    <button class="btn active" id="cubeBtn">정육면체</button>
    <button class="btn" id="cuboidBtn">직육면체</button>
    <h3>전개도 선택</h3>
    <button class="btn active net" data-net="0">전개도 ①</button>
    <button class="btn net" data-net="1">전개도 ②</button>
    <button class="btn net" data-net="2">전개도 ③</button>
    <h3>활동</h3>
    <button class="btn primary" id="foldBtn">입체도형으로 접기</button>
    <button class="btn" id="unfoldBtn">전개도로 펼치기</button>
    <div class="smallbox">1. 전개도를 선택하세요.<br>2. ‘입체도형으로 접기’를 누르면 천천히 접히는 과정이 보여요.<br>3. 완성된 뒤에는 마우스로 드래그해서 직접 돌려 보세요.<br>※ 자동 회전은 하지 않아요.</div>
  </aside>
  <main>
    <div class="label">전개도 / 접히는 과정</div>
    <div class="hint">드래그: 회전 · 휠: 확대/축소</div>
    <canvas id="stage"></canvas>
    <div class="toast" id="toast">전개도의 면들이 서로 붙은 상태로 천천히 접혀요.</div>
  </main>
</div>
<script>
const canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
let W=0,H=0,shape='cube',net=0,progress=0,target=0,anim=null,scale=1,drag=false,lastX=0,lastY=0,rotX=-0.55,rotY=0.55;
const colors=['#74b9ff','#ffad5c','#6ee790','#ffdf54','#b89cff','#ff8798'];
function resize(){W=canvas.width=canvas.clientWidth*devicePixelRatio;H=canvas.height=canvas.clientHeight*devicePixelRatio;draw()} addEventListener('resize',resize);
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function dims(){return shape==='cube'?{w:180,h:180,d:180}:{w:260,h:150,d:105}}
function add(a,b){return [a[0]+b[0],a[1]+b[1],a[2]+b[2]]} function mul(a,s){return [a[0]*s,a[1]*s,a[2]*s]} function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
function rot(p){let [x,y,z]=p; let cy=Math.cos(rotY),sy=Math.sin(rotY),cx=Math.cos(rotX),sx=Math.sin(rotX); let x1=x*cy+z*sy,z1=-x*sy+z*cy; let y1=y*cx-z1*sx,z2=y*sx+z1*cx; return [x1,y1,z2]}
function proj(p){p=rot(p); let f=720/(720-p[2]); return [W/2+p[0]*f*scale, H/2+p[1]*f*scale, p[2]]}
function rect(cx,cy,w,h){return [[cx-w/2,cy-h/2,0],[cx+w/2,cy-h/2,0],[cx+w/2,cy+h/2,0],[cx-w/2,cy+h/2,0]]}
function finalFaces(){let {w,h,d}=dims(); return [
  [[-w/2,-h/2,d/2],[w/2,-h/2,d/2],[w/2,h/2,d/2],[-w/2,h/2,d/2]],
  [[-w/2,-h/2,-d/2],[w/2,-h/2,-d/2],[w/2,-h/2,d/2],[-w/2,-h/2,d/2]],
  [[w/2,-h/2,d/2],[w/2,-h/2,-d/2],[w/2,h/2,-d/2],[w/2,h/2,d/2]],
  [[-w/2,-h/2,-d/2],[-w/2,-h/2,d/2],[-w/2,h/2,d/2],[-w/2,h/2,-d/2]],
  [[-w/2,h/2,d/2],[w/2,h/2,d/2],[w/2,h/2,-d/2],[-w/2,h/2,-d/2]],
  [[w/2,-h/2,-d/2],[-w/2,-h/2,-d/2],[-w/2,h/2,-d/2],[w/2,h/2,-d/2]]
]}
function flatFaces(){let {w,h,d}=dims(); let layouts=[
  [[0,0,w,h],[0,-(h+d)/2,w,d],[(w+d)/2,0,d,h],[-(w+d)/2,0,d,h],[0,(h+d)/2,w,d],[0,h+d,w,h]],
  [[0,0,w,h],[-(w+d)/2,0,d,h],[(w+d)/2,0,d,h],[0,-(h+d)/2,w,d],[0,(h+d)/2,w,d],[0,-h-d,w,h]],
  [[0,0,w,h],[-(w+d)/2,0,d,h],[(w+d)/2,0,d,h],[0,h+d,w,h],[0,(h+d)/2,w,d],[0,-(h+d)/2,w,d]]
 ]; return layouts[net].map(r=>rect(r[0],r[1],r[2],r[3]));}
function faces(){let flat=flatFaces(),fin=finalFaces(),t=ease(progress);return flat.map((f,i)=>f.map((p,j)=>mix(p,fin[i][j],t)))}
function draw(){ctx.clearRect(0,0,W,H);let fs=faces().map((f,i)=>({i,pts:f,avg:f.reduce((s,p)=>s+rot(p)[2],0)/4}));fs.sort((a,b)=>a.avg-b.avg);for(const f of fs){let ps=f.pts.map(proj);ctx.beginPath();ctx.moveTo(ps[0][0],ps[0][1]);for(let k=1;k<4;k++)ctx.lineTo(ps[k][0],ps[k][1]);ctx.closePath();ctx.fillStyle=colors[f.i];ctx.fill();ctx.lineWidth=4*devicePixelRatio;ctx.strokeStyle='#1f2937';ctx.stroke();let cx=ps.reduce((s,p)=>s+p[0],0)/4,cy=ps.reduce((s,p)=>s+p[1],0)/4;ctx.fillStyle='#111827';ctx.font=`${Math.max(18,34*scale)*devicePixelRatio}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`900 ${Math.max(22,42*scale)*devicePixelRatio}px Arial`;ctx.fillText(String(f.i+1),cx,cy)}
}
function animateTo(v){cancelAnimationFrame(anim);let start=progress,st=performance.now(),dur=3200;function step(now){let u=Math.min(1,(now-st)/dur);progress=start+(v-start)*ease(u);draw();if(u<1)anim=requestAnimationFrame(step)}anim=requestAnimationFrame(step)}
document.getElementById('foldBtn').onclick=()=>animateTo(1);document.getElementById('unfoldBtn').onclick=()=>animateTo(0);
document.getElementById('cubeBtn').onclick=()=>{shape='cube';progress=0;setActive();draw()};document.getElementById('cuboidBtn').onclick=()=>{shape='cuboid';progress=0;setActive();draw()};
document.querySelectorAll('.net').forEach(b=>b.onclick=()=>{net=+b.dataset.net;progress=0;setActive();draw()});
function setActive(){cubeBtn.classList.toggle('active',shape==='cube');cuboidBtn.classList.toggle('active',shape==='cuboid');document.querySelectorAll('.net').forEach((b,i)=>b.classList.toggle('active',i===net));document.getElementById('toast').textContent=(shape==='cube'?'정육면체':'직육면체')+' 전개도가 서로 붙은 상태로 천천히 접혀요.'}
canvas.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;lastY=e.clientY});addEventListener('mouseup',()=>drag=false);addEventListener('mousemove',e=>{if(!drag)return;rotY+=(e.clientX-lastX)*0.01;rotX+=(e.clientY-lastY)*0.01;lastX=e.clientX;lastY=e.clientY;draw()});
canvas.addEventListener('wheel',e=>{e.preventDefault();scale=Math.min(2.2,Math.max(.55,scale*(e.deltaY>0?.9:1.1)));draw()},{passive:false});
resize();
</script>
</body>
</html>
